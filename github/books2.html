<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Livro</title>
</head>

<body>

    <!-- Capa do livro -->
    <img src="images.2.jfif" width="300">
    
    <!-- Nome do livro -->
    <h1>quadrinhos riquinho</h1>

    <!-- Nome do aluno -->
    <p>Aluno:Mikel Luiz</p>

    <!-- Formulário -->
    <form action="https://nic.ifrn.edu.br/aulas/atividade_04/" method="post">

        <label for="nome">Seu nome:</label>
        <br>
        <input type="text" id="nome" name="nome">

        <br><br>

        <label for="comentario">
            Escreva sua avaliação:
        </label>

        <br>

        <textarea
            id="comentario"
            name="comentario"
            rows="5"
            cols="40">
        </textarea>

        <br><br>

        <label for="nota">Nota para o livro:</label>

        <br>

        <select id="nota" name="nota">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <br><br>

        <button type="submit">
            Enviar
        </button>

    </form>

</body>

</html>
